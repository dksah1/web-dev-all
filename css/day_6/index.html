    <title>CSS Size Units in Depth</title>

  <style>
    :root {
      font-size: 15px;
    }

    p {
      width: 90vw;
      height: fit-content;
      background-color: lightblue;
      font-size: 2rem; /* 1rem = 15px */
    }
    .dabba {
      /* width: 50%; */
      height: 0px;
      /* height: 100%; */
      min-height: 300px;
     /* overflow: hidden; */
      background-color: lightcoral;
    }
    span {
      width: 100%;
      height: 200px;
      background-color: aqua;
      display: none;
    }
  </style>
  <body>
    <h1>
      CSS Size Units in Depth: Unlocking the Power of px, %, vw, vh, em, and rem
    </h1>
