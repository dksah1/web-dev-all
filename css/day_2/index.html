<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      p {
        font-size: 18px;
      }
      .box {
        background-color: aqua;
        height: 200px;
        width: 200px;
      }
      #paragraph {
        background-color: yellow;
        height: 100px;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <h1 style="color: green">Selectors in css</h1>
    <h2>Syntax</h2>
    <h3>selector { property: value; }</h3>
    <h2>Types of selectors</h2>
    <h3>1. Element/tagname selector</h3>
    <p>Elon Reeve Musk</p>
    <h3>2. Class selector</h3>
    <div class="box">Lorem ipsum dolor sit amet.</div>

    <h3>3. ID selector</h3>
    <div id="paragraph">This is a unique box.</div>
  </body>
</html>
